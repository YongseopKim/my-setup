##### TPM
set -g @plugin 'tmux-plugins/tpm'

##### Plugin
#set -g @plugin 'tmux-plugins/tmux-resurrect'
#set -g @plugin 'tmux-plugins/tmux-continuum'
#set -g @continuum-restore 'on'   # 부팅 시 자동 복원
#set -g @continuum-save-interval '15'  # 15분마다 자동 저장

##### Prefix (screen-style) #####
unbind C-b
set -g prefix C-a
bind C-a send-prefix

##### 기본 UX #####
set -g mouse on                       # 마우스로 pane 선택/리사이즈/스크롤
setw -g mode-keys vi                  # copy-mode에서 vi 키 사용
set -g set-clipboard on

# 윈도우/패널 인덱스 1부터
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on            # 윈도우 닫으면 번호 재정렬

##### 터미널/색상 (256color + TrueColor) #####
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB'
# iTerm2 + tmux TrueColor 조합
set -ga terminal-overrides ",:Tc"
# iTerm2에서 undercurl, styled underline 지원
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

##### 스크롤백 #####
set -g history-limit 10000            # scrollback (메모리/로그 폭주 시 조정)

##### 키/반응 #####
set -sg escape-time 0                 # ESC 딜레이 제거 (vim 사용자에 유리)
set -g repeat-time 500

##### Pane 분할/이동 편의 #####
# 분할 시 현재 경로 유지
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# vim 스타일 pane 이동
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### 상태바 (가볍고 깔끔하게) #####
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e]"
set -g status-right "#[fg=#a6adc8]%Y-%m-%d %H:%M "
set -g status-left-length 40
set -g status-right-length 80

# 윈도우 탭
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#89b4fa,bold] #I:#W "

# pane border
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# message/command line
set -g message-style "bg=#1e1e2e,fg=#cdd6f4"

##### 설정 리로드 #####
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

##### 마우스 copy-mode 개선 #####
# 드래그 선택 후 마우스 버튼 놓으면 자동 클립보드 복사 (macOS)
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# vi copy-mode에서 v로 선택, y로 복사
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# 더블클릭 단어 선택, 트리플클릭 줄 선택
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H; send-keys -X select-word; run-shell -d 0.3; send-keys -X copy-pipe-and-cancel "pbcopy" }

# TPM 초기화 (반드시 맨 마지막 줄)
run '~/.tmux/plugins/tpm/tpm'
